name: Loomacs Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-emacs-30:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Loomacs CI paths
        shell: bash
        run: |
          # RUNNER_TEMP 只在 Job 已分配到 Runner 后存在，不能用于 Job 级表达式。
          echo "XDG_STATE_HOME=$RUNNER_TEMP/loomacs-state" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=$RUNNER_TEMP/loomacs-cache" >> "$GITHUB_ENV"

      - name: Install GNU Emacs 30
        run: brew install emacs

      - name: Install declared Emacs packages
        run: ./scripts/install-packages

      - name: Rebuild generated configuration
        run: ./scripts/build

      - name: Verify generated configuration is committed
        shell: bash
        run: |
          # 构建只能验证源码可生成；这里同时阻止漏提交修改或新增的 last-known-good 产物。
          if [[ -n "$(git status --porcelain -- generated/)" ]]; then
            git status --short -- generated/
            echo "generated/ differs from the committed Org sources" >&2
            exit 1
          fi

      - name: Run Loomacs checks
        run: ./scripts/check
